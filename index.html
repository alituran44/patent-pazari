                              <span className="text-[10px] bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded capitalize">{i.durum}</span>
                            </div>
                            <div className="text-slate-600 line-clamp-1">{l?.baslik}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* RIGHT: CHAT & SUCCESS INCENTIVE */}
                  <div className="lg:col-span-7">
                    {activeChatInterestId ? (
                      (() => {
                        const interest = interests.find(i => i.id === activeChatInterestId);
                        const listing = listings.find(l => l.id === interest?.ilan_id);
                        const threadMsgs = messages.filter(m => m.ilgi_id === activeChatInterestId);

                        return (
                          <div className="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[550px]">
                            <div className="p-4 border-b bg-slate-50 rounded-t-xl flex justify-between items-center">
                              <div>
                                <h4 className="font-bold text-sm text-slate-900">{listing?.baslik}</h4>
                                <div className="text-xs text-slate-500">Alıcı: {interest?.alici_ad}</div>
                              </div>
                            </div>

                            {/* OLGUNLASTI NOTER & SUCCESS INCENTIVE BANNER */}
                            {interest?.durum === 'olgunlasti' && (
                              <div className="m-3 p-4 bg-emerald-50 border border-emerald-300 rounded-xl space-y-2 text-xs text-emerald-900">
                                <div className="font-bold flex items-center gap-1.5 text-emerald-950">
                                  <Icon name="scale" className="w-4 h-4 text-emerald-700" />
                                  <span>HUKUKİ YÖNLENDİRME & BAŞARI TEŞVİKİ (SMK 6769)</span>
                                </div>
                                <p>Devir sözleşmeleri noter huzurunda yapılmak zorundadır (SMK 6769). Noter onayı olmayan devir TÜRKPATENT nezdinde hüküm doğurmaz.</p>
                                <div className="pt-1 flex items-center justify-between bg-white/80 p-2 rounded border border-emerald-200">
                                  <span className="font-semibold text-emerald-800">🎁 İşlemi Bildir & İndirim Kazan:</span>
                                  <button onClick={() => alert('İşlem bildirimi alındı! Sonraki ilan ücretinizde %50 indirim tanımlandı.')} className="bg-emerald-700 text-white font-bold px-2.5 py-1 rounded text-[11px]">
                                    Noter Devrini Bildir
                                  </button>
                                </div>
                              </div>
                            )}

                            <div className="flex-1 p-4 overflow-y-auto space-y-2 bg-slate-50/50">
                              {threadMsgs.map(m => (
                                <div key={m.id} className={`flex flex-col ${m.gonderen_id === currentUser.id ? 'items-end' : 'items-start'}`}>
                                  <div className="text-[10px] text-slate-400">{m.gonderen_ad}</div>
                                  <div className={`max-w-md p-2.5 rounded-xl text-xs ${m.gonderen_id === currentUser.id ? 'bg-brand-600 text-white' : 'bg-white border text-slate-800'}`}>
                                    {m.icerik}
                                  </div>
                                </div>
                              ))}
                            </div>

                            <div className="p-3 border-t bg-white">
                              <form onSubmit={(e) => {
                                e.preventDefault();
                                const text = e.target.chatInput.value;
                                if (!text.trim()) return;
                                setMessages([...messages, { id: 'msg_' + Date.now(), ilgi_id: activeChatInterestId, gonderen_id: currentUser.id, gonderen_ad: currentUser.ad, icerik: text, tarih: 'Şimdi' }]);
                                e.target.reset();
                              }} className="flex gap-2 text-xs">
                                <input type="text" name="chatInput" placeholder="Mesaj yazın..." className="flex-1 p-2 border rounded-lg" />
                                <button type="submit" className="bg-brand-600 text-white font-semibold px-4 py-2 rounded-lg">Gönder</button>
                              </form>
                            </div>
                          </div>
                        );
                      })()
                    ) : (
                      <div className="bg-white rounded-xl border p-12 text-center text-slate-400 text-xs">Görüşme detayları için soldan bir iletişim seçin.</div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* --- SCREEN 5: GELİR MODELİ & FİYATLANDIRMA --- */}
            {activeTab === 'pricing' && (
              <div className="max-w-5xl mx-auto px-4 py-12 space-y-10">
                <div className="text-center space-y-3 max-w-2xl mx-auto">
                  <h1 className="font-display text-3xl font-bold text-slate-900">Esnek & Şeffaf Fiyatlandırma</h1>
                  <p className="text-slate-600 text-xs">Likidite öncelikli, komisyon baskısı olmayan şeffaf ilan ve abonelik paketleri.</p>
                </div>

                <div className="grid md:grid-cols-4 gap-6">
                  {[
                    { title: 'Başlangıç', price: 'Ücretsiz', desc: 'Bireysel Buluş Sahibi', features: ['İlk 2 İlan Ücretsiz', 'Temel Sicil Linki', 'Doğrudan Alıcı Mesajlaşması'], cta: 'Ücretsiz Başla', popular: false },
                    { title: 'Standart', price: '499 TL / ay', desc: 'Bireysel & KOBİ Satıcı', features: ['Sınırsız İlan Yayınlama', 'Öncelikli Sicil Doğrulama', 'Gelişmiş İstatistikler'], cta: 'Paket Seç', popular: true },
                    { title: 'Öne Çıkan', price: '299 TL / ilan', desc: 'Hızlı Ticaret İsteyenler', features: ['Ana Sayfada Üst Sıra', 'Sektör Aramasında Vurgu', '30 Gün Vitrin Gösterimi'], cta: 'Vitrin Satın Al', popular: false },
                    { title: 'Kurumsal', price: '9.999 TL / yıl', desc: 'TTO, Vekil & Yatırımcı', features: ['Doğrulanmış Kurum Rozeti', 'Sınırsız İlgi Gönderme', 'Öncelikli Eşleşme Bildirimi'], cta: 'Kurumsal Başvuru', popular: false }
                  ].map((p, idx) => (
                    <div key={idx} className={`bg-white rounded-2xl border p-6 space-y-5 flex flex-col justify-between relative ${p.popular ? 'border-brand-500 shadow-lg' : 'border-slate-200'}`}>
                      {p.popular && <span className="absolute -top-3 left-1/2 -translate-x-1/2 bg-brand-600 text-white text-[10px] font-bold px-3 py-0.5 rounded-full">EN POPÜLER</span>}
                      <div className="space-y-3">
                        <h3 className="font-bold text-slate-900 text-lg">{p.title}</h3>
                        <div className="font-display text-2xl font-extrabold text-brand-700">{p.price}</div>
                        <p className="text-xs text-slate-500">{p.desc}</p>
                        <ul className="space-y-2 pt-3 border-t text-xs text-slate-600">
                          {p.features.map((f, i) => (
                            <li key={i} className="flex items-center gap-1.5">
                              <Icon name="checkCircle" className="w-3.5 h-3.5 text-emerald-600" />
                              <span>{f}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                      <button onClick={() => alert('Demo Modu: Ödeme talebiniz kayda alındı.')} className={`w-full py-2.5 rounded-xl text-xs font-bold ${p.popular ? 'bg-brand-600 text-white' : 'bg-slate-100 text-slate-800 hover:bg-slate-200'}`}>
                        {p.cta}
                      </button>
                    </div>
                  ))}
                </div>

                {/* TRUST INCENTIVE EXPLANATION */}
                <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 text-xs text-emerald-950 space-y-2">
                  <h4 className="font-bold text-sm text-emerald-900 flex items-center gap-1.5">
                    <Icon name="sparkles" className="w-4 h-4 text-emerald-600" />
                    <span>Güvene Dayalı Başarı Teşviki (İşlemi Bildir & İndirim Kazan)</span>
                  </h4>
                  <p>
                    Platformumuz işlem üzerinden zorunlu komisyon kesintisi yapmaz. Anlaşması Noter nezdinde tamamlanan devir/lisans işlemlerini platforma bildiren kullanıcılarımıza sonraki ilan paketlerinde %50 indirim kuponu tanımlanır.
                  </p>
                </div>
              </div>
            )}

            {/* --- SCREEN 6: ADVANCED ADMIN PANEL & MODERATION --- */}
            {activeTab === 'admin' && (
              <div className="max-w-7xl mx-auto px-4 py-8 space-y-8">
                <div className="border-b border-slate-200 pb-4">
                  <h1 className="font-display text-2xl font-bold text-slate-900">Sistem Yönetimi & Moderasyon Masası</h1>
                  <p className="text-slate-500 text-xs mt-0.5">TÜRKPATENT Sicil Doğrulama, Kurumsal Onay & Kapsam Dışı Filtresi</p>
                </div>

                {/* STATS CARDS */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
                  <div className="bg-white p-4 rounded-xl border text-center space-y-1">
                    <div className="text-slate-400">Toplam İlan</div>
                    <div className="font-display text-2xl font-bold text-slate-900">{listings.length}</div>
                  </div>
                  <div className="bg-white p-4 rounded-xl border text-center space-y-1">
                    <div className="text-slate-400">Bekleyen Doğrulama</div>
                    <div className="font-display text-2xl font-bold text-amber-600">{listings.filter(l => l.sicil_durumu === 'bekliyor').length}</div>
                  </div>
                  <div className="bg-white p-4 rounded-xl border text-center space-y-1">
                    <div className="text-slate-400">Aktif İlgi Bildirimi</div>
                    <div className="font-display text-2xl font-bold text-emerald-600">{interests.length}</div>
                  </div>
                  <div className="bg-white p-4 rounded-xl border text-center space-y-1">
                    <div className="text-slate-400">Şikayetli İlanlar</div>
                    <div className="font-display text-2xl font-bold text-red-600">{reports.length}</div>
                  </div>
                </div>

                {/* MODERATION RULES NOTICE */}
                <div className="bg-slate-900 text-slate-200 p-5 rounded-2xl text-xs space-y-2">
                  <h4 className="font-bold text-white text-sm">Yönetici Moderasyon Prensipleri (SMK 6769):</h4>
                  <ol className="list-decimal pl-4 space-y-1 text-slate-300">
                    <li>Sicil no formatı ve TÜRKPATENT resmi sorgu kaydı teyit edilmeden ilan onaylanamaz.</li>
                    <li>Silah (F41, F42) ve Nükleer (G21) kategorileri otomatik kısıtlamaya tabidir.</li>
                    <li>Aynı sicil no ile mükerrer ilan tespit edilirse ikinci ilan askıya alınır.</li>
                    <li>Kurumsal hesap doğrulamaları ticaret sicil gazetesi teyidi ile verilmelidir.</li>
                  </ol>
                </div>

                {/* LISTINGS MODERATION TABLE */}
                <div className="bg-white rounded-xl border overflow-hidden shadow-sm text-xs">
                  <div className="p-4 border-b bg-slate-50 font-bold text-slate-800">İlan Onay & Sicil Doğrulama Kuyruğu</div>
                  <table className="w-full text-left">
                    <thead className="bg-slate-50 text-slate-500 font-semibold border-b">
                      <tr>
                        <th className="p-3">Patent / Buluş Adı</th>
                        <th className="p-3">Hak Türü</th>
                        <th className="p-3">IPC</th>
                        <th className="p-3">Sicil No</th>
                        <th className="p-3">Durum</th>
                        <th className="p-3 text-right">İşlem</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y">
                      {listings.map(l => (
                        <tr key={l.id} className="hover:bg-slate-50">
                          <td className="p-3 font-semibold text-slate-900 max-w-xs truncate">{l.baslik}</td>
                          <td className="p-3 capitalize">{l.hak_turu}</td>
                          <td className="p-3 font-mono font-bold text-brand-700">IPC {l.ipc_ana}</td>
                          <td className="p-3 font-mono">{l.patent_no}</td>
                          <td className="p-3">
                            {l.sicil_durumu === 'dogrulandi' && <span className="bg-emerald-100 text-emerald-800 font-bold px-2 py-0.5 rounded text-[10px]">Doğrulandı</span>}
                            {l.sicil_durumu === 'bekliyor' && <span className="bg-amber-100 text-amber-800 font-medium px-2 py-0.5 rounded text-[10px]">İnceleme Bekliyor</span>}
                            {l.sicil_durumu === 'reddedildi' && <span className="bg-red-100 text-red-800 font-bold px-2 py-0.5 rounded text-[10px]">Reddedildi</span>}
                          </td>
                          <td className="p-3 text-right space-x-2">
                            {l.sicil_durumu !== 'dogrulandi' && (
                              <button onClick={() => handleAdminApprove(l.id)} className="bg-emerald-600 text-white px-2.5 py-1 rounded font-bold">Onayla</button>
                            )}
                            {l.sicil_durumu !== 'reddedildi' && (
                              <button onClick={() => setRejectModalListingId(l.id)} className="bg-red-600 text-white px-2.5 py-1 rounded font-bold">Reddet</button>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* CORPORATE USER VERIFICATION TABLE */}
                <div className="bg-white rounded-xl border p-5 space-y-4 text-xs">
                  <h4 className="font-bold text-slate-900 text-sm">Kurumsal Kullanıcı Doğrulama Kuyruğu</h4>
                  <div className="space-y-2">
                    {users.map(u => (
                      <div key={u.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border">
                        <div>
                          <div className="font-bold text-slate-900">{u.ad} ({u.sirket_adi})</div>
                          <div className="text-slate-500 text-[11px]">Rol: {u.rol.toUpperCase()}</div>
                        </div>
                        <button
                          onClick={() => handleToggleUserVerification(u.id)}
                          className={`px-3 py-1 rounded font-bold ${u.dogrulanmis ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-200 text-slate-700'}`}
                        >
                          {u.dogrulanmis ? 'Doğrulanmış Rozeti Kaldır' : 'Doğrulanmış Rozeti Ver'}
                        </button>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            )}

            {/* --- SCREEN 7: HUKUKİ REHBER --- */}
            {activeTab === 'guide' && (
              <div className="max-w-4xl mx-auto px-4 py-10 space-y-6 text-xs text-slate-700 leading-relaxed">
                <h1 className="font-display text-3xl font-bold text-slate-900 text-center mb-6">SMK 6769 Hukuki Rehber & Yasal Statü</h1>
                <div className="bg-white p-8 rounded-2xl border space-y-4 shadow-sm">
                  <h3 className="font-bold text-base text-slate-900">1. Noter Devir Şartı (SMK 6769 m. 148)</h3>
                  <p>Patent ve faydalı model devir sözleşmelerinin geçerli olabilmesi için Noter nezdinde düzenleme şeklinde yapılması zorunludur.</p>
                  <h3 className="font-bold text-base text-slate-900 pt-3 border-t">2. TÜRKPATENT Sicil Kaydı</h3>
                  <p>Noter onayı tamamlanan sözleşmeler resmi Patent Vekili aracılığıyla TÜRKPATENT Sicili'ne tescil ettirilmelidir.</p>
                </div>
              </div>
            )}

          </main>

          {/* REJECT REASON MODAL */}
          {rejectModalListingId && (
            <div className="fixed inset-0 bg-slate-950/70 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 max-w-md w-full space-y-4 text-xs">
                <h3 className="font-bold text-base text-slate-900">İlan Red Gerekçesi Giriniz</h3>
                <textarea
                  rows="3"
                  value={rejectReasonInput}
                  onChange={(e) => setRejectReasonInput(e.target.value)}
                  placeholder="Örn: TÜRKPATENT sicil no formatı hatalı veya kapsam dışı kategori..."
                  className="w-full p-2.5 border rounded-lg"
                ></textarea>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setRejectModalListingId(null)} className="px-3 py-1.5 border rounded-lg">İptal</button>
                  <button onClick={handleAdminRejectSubmit} className="px-4 py-1.5 bg-red-600 text-white font-bold rounded-lg">Reddet</button>
                </div>
              </div>
            </div>
          )}

          {/* DETAIL MODAL */}
          {selectedListingDetail && (
            <div className="fixed inset-0 bg-slate-950/70 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 max-w-xl w-full space-y-4 text-xs max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-start">
                  <div>
                    <span className="font-mono text-slate-400 font-bold">{selectedListingDetail.patent_no}</span>
                    <h2 className="font-bold text-lg text-slate-900 mt-1">{selectedListingDetail.baslik}</h2>
                  </div>
                  <button onClick={() => setSelectedListingDetail(null)} className="text-slate-400 font-bold">✕</button>
                </div>

                <div className="bg-slate-50 p-4 rounded-xl border grid grid-cols-2 gap-3">
                  <div><span className="text-slate-400 block">Sahiplik:</span><strong>{selectedListingDetail.satici_sirket}</strong></div>
                  <div><span className="text-slate-400 block">IPC Kodu:</span><strong className="text-brand-700">IPC {selectedListingDetail.ipc_ana}</strong></div>
                  <div><span className="text-slate-400 block">Model:</span><strong className="capitalize">{selectedListingDetail.model_tipi}</strong></div>
                  <div><span className="text-slate-400 block">Beklenti:</span><strong className="text-emerald-700">{selectedListingDetail.asgari_beklenti}</strong></div>
                </div>

                <p className="leading-relaxed text-slate-700">{selectedListingDetail.aciklama}</p>

                {selectedListingDetail.sicil_link && (
                  <a href={selectedListingDetail.sicil_link} target="_blank" className="inline-flex items-center gap-1 text-brand-600 font-bold bg-brand-50 border px-3 py-1.5 rounded-lg">
                    <span>TÜRKPATENT Sicil Kaydını Sorgula</span>
                    <Icon name="externalLink" className="w-3.5 h-3.5" />
                  </a>
                )}

                <div className="flex justify-end gap-2 border-t pt-3">
                  <button onClick={() => setSelectedListingDetail(null)} className="px-4 py-2 border rounded-lg">Kapat</button>
                  <button onClick={() => { setSelectedListingDetail(null); setActiveTab('dashboard'); }} className="px-5 py-2 bg-brand-600 text-white font-bold rounded-lg">İlgileniyorum / İletişim</button>
                </div>
              </div>
            </div>
          )}

          {/* FOOTER */}
          <footer className="bg-slate-900 text-slate-400 text-xs py-8 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 space-y-4">
              <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                <span className="font-display font-bold text-white text-base">PATENTPAZARI</span>
                <div className="flex gap-4">
                  <button onClick={() => setActiveTab('pricing')} className="hover:text-white">Fiyatlandırma</button>
                  <button onClick={() => setActiveTab('guide')} className="hover:text-white">SMK 6769 Rehberi</button>
                </div>
              </div>
              <p className="text-[11px] text-slate-500 leading-relaxed">
                <strong>Genel Sorumluluk Reddi:</strong> Platform bir keşfedilebilirlik portalıdır; hukuki danışmanlık veya noterlik sunmaz. Devir işlemleri Noter huzurunda yapılmalıdır.
              </p>
            </div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
