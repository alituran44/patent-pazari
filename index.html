<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patent Pazarı Enterprise — Canlı İhale, AI & S3 Data Room</title>
  <meta name="description" content="Tersine İhale, WebSockets Canlı Açık Artırma, Yapay Zeka Anlamsal Eşleştirme ve S3 Presigned Veri Odası Platformu">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#0284c7',
              600: '#0369a1',
              700: '#075985',
              900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>

  <!-- React 18 & Babel Standalone CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .font-display { font-family: 'Outfit', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        shieldCheck: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" />,
        externalLink: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />,
        user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />,
        messageSquare: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />,
        scale: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m0 0l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 6l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 6l3 9" />,
        sparkles: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />,
        zap: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />,
        lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
        download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
        refresh: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />,
        chevronRight: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />,
        bot: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
      };
      return <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">{icons[name] || null}</svg>;
    };

    // DEMO DATA INCLUDING REVERSE AUCTIONS
    const DEMO_REVERSE_AUCTIONS = [
      {
        id: 'req_001',
        title: 'Depreme Dayanıklı Prefabrik Beton Kilit Teknolojisi İhalesi',
        company_name: 'TOKİ & Kamu Konut Müteahhitliği A.Ş.',
        problem_statement: 'Konut projelerinde hızlı montaj sağlayan, polimer conta kilitli prefabrik dış cephe panelleri ve bağlantı elamanı arıyoruz.',
        max_budget_try: 4500000,
        current_lowest_bid_try: 3800000,
        bids_count: 4,
        source_type: 'ekap_scraper',
        ipc_code: 'E04B',
        time_left: '04 saat 12 dk'
      },
      {
        id: 'req_002',
        title: 'Tünel Kazılarında Su Yalıtımlı Akıllı Enjeksiyon Harcı İhtiyacı',
        company_name: 'Kalyon & Cengiz İnşaat Konsorsiyumu',
        problem_statement: 'Metro ve tünel inşaatlarında yüksek basınçlı yeraltı suyunu 5 dakikada tıkama özelliğine sahip poliüretan esaslı enjeksiyon kimyasalı.',
        max_budget_try: 2800000,
        current_lowest_bid_try: 2450000,
        bids_count: 2,
        source_type: 'manual',
        ipc_code: 'E21',
        time_left: '18 saat 45 dk'
      }
    ];

    const DEMO_PATENTS = [
      {
        id: 'pat_001',
        title: 'Elektrikli Araçlar İçin Yüksek Verimli Batarya Isı Yönetim Sistemi',
        patent_no: 'TR 2024/01482 B',
        satici_sirket: 'Yılmaz AR-GE Danışmanlık',
        ipc_code: 'H01',
        model_tipi: 'lisans',
        min_expectation: '750.000 TL',
        abstract: 'Buluş, aşırı şarj ve yüksek hava sıcaklıklarında batarya paketlerinin sıcaklığını 35°C eşiğinde tutan faz değiştiren mikro-kapsüllü soğutma geometrisi sunar.'
      },
      {
        id: 'pat_009',
        title: 'Depreme Dayanıklı Hafif Polimerik Beton Bileşimi ve Üretim Yöntemi',
        patent_no: 'TR 2022/19082 B',
        satici_sirket: 'BiyoKimya İnovasyon Ltd.',
        ipc_code: 'E04',
        model_tipi: 'satis',
        min_expectation: '3.000.000 TL',
        abstract: 'Geleneksel betona göre %40 daha hafif, esneklik katsayısı (elastic modulus) 2.2 kat yüksek geri dönüştürülmüş plastik polimer katkılı patent tescili.'
      }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('auctions'); // auctions | patents | ai_match | data_room
      const [auctions, setAuctions] = useState(DEMO_REVERSE_AUCTIONS);
      const [patents, setPatents] = useState(DEMO_PATENTS);
      
      // Real-Time Bidding State
      const [selectedAuctionBid, setSelectedAuctionBid] = useState(null);
      const [bidAmountInput, setBidAmountInput] = useState('');
      const [bidNotice, setBidNotice] = useState(null);

      // AI Match State
      const [aiQueryText, setAiQueryText] = useState('Depremde hasar görmeyen hafif beton ve montaj kilit sistemi arıyoruz.');
      const [aiMatches, setAiMatches] = useState([]);
      const [aiLoading, setAiLoading] = useState(false);

      // Data Room & NDA State
      const [selectedDataRoomPatent, setSelectedDataRoomPatent] = useState(null);
      const [ndaAccepted, setNdaAccepted] = useState(false);
      const [presignedUrl, setPresignedUrl] = useState(null);

      // Trigger Scraper
      const handleTriggerScraper = () => {
        const newTender = {
          id: 'req_' + Date.now(),
          title: 'Otoyol Köprü Derzleri İçin Sessiz ve Yüksek Esneklikli Genleşme Profili',
          company_name: 'Karayolları Genel Müdürlüğü (EKAP Otomatik Bot)',
          problem_statement: 'Viyadük ve köprü bağlantılarında gürültüyü sönümleyen elastomer köprü genleşme derzi teknolojisi.',
          max_budget_try: 1750000,
          current_lowest_bid_try: 1600000,
          bids_count: 1,
          source_type: 'ekap_scraper',
          ipc_code: 'E01',
          time_left: '23 saat 59 dk'
        };
        setAuctions([newTender, ...auctions]);
        alert('EKAP & Kamu İnşaat İhale Scraper Botu Tetiklendi! Yeni kamu talebi veritabanına aktarıldı.');
      };

      // Real-Time Bid Submission Simulation (WebSocket / Atomic SQL)
      const handleSendLiveBid = (e) => {
        e.preventDefault();
        const amount = parseFloat(bidAmountInput);
        if (!selectedAuctionBid) return;
        if (amount >= selectedAuctionBid.current_lowest_bid_try) {
          alert(`Teklifiniz mevcut en düşük tekliften (${selectedAuctionBid.current_lowest_bid_try.toLocaleString()} TL) daha düşük olmalıdır.`);
          return;
        }

        const updatedAuctions = auctions.map(a => {
          if (a.id === selectedAuctionBid.id) {
            return {
              ...a,
              current_lowest_bid_try: amount,
              bids_count: a.bids_count + 1
            };
          }
          return a;
        });

        setAuctions(updatedAuctions);
        setBidNotice(`✅ CANLI TEKLİF KABUL EDİLDİ! Yeni En Düşük Teklif: ${amount.toLocaleString()} TL (WebSocket Üzerinden Tüm İlgililere Yayınlandı)`);
        setBidAmountInput('');
        setTimeout(() => setBidNotice(null), 5000);
      };

      // AI Match Trigger
      const handleRunAiMatch = () => {
        setAiLoading(true);
        setTimeout(() => {
          setAiMatches([
            {
              patent_number: 'TR 2022/19082 B',
              title: 'Depreme Dayanıklı Hafif Polimerik Beton Bileşimi ve Üretim Yöntemi',
              satici_sirket: 'BiyoKimya İnovasyon Ltd.',
              ipc_code: 'IPC E04 — Binalar',
              match_score: 94.8,
              ai_rationale: 'Bu patent, aradığınız deprem dayanımlı esnek polimer bağlayıcılı beton hafiflik katsayısını %94.8 anlamsal doğrulukla karşılamaktadır.'
            },
            {
              patent_number: 'TR 2024/01482 B',
              title: 'Elektrikli Araçlar İçin Yüksek Verimli Batarya Isı Yönetim Sistemi',
              satici_sirket: 'Yılmaz AR-GE Danışmanlık',
              ipc_code: 'IPC H01 — Elektrik',
              match_score: 62.3,
              ai_rationale: 'Termal yalıtım ve mikro-kapsüllü polimer faz değişimi yönüyle kısmi teknik örtüşme bulunmaktadır.'
            }
          ]);
          setAiLoading(false);
        }, 600);
      };

      // Generate Presigned S3 Link
      const handleAcceptNdaAndGetPresignedUrl = () => {
        if (!ndaAccepted) {
          alert('Devam etmek için Dijital Gizlilik Sözleşmesini (NDA) onaylamalısınız.');
          return;
        }
        setPresignedUrl(`https://patent-pazari-secure-data-room.s3.eu-central-1.amazonaws.com/patents/${selectedDataRoomPatent.id}/gizli_teknik_sartname.pdf?X-Amz-Expires=900&X-Amz-Signature=secure_presigned_proof_${Date.now()}`);
      };

      return (
        <div className="min-h-screen flex flex-col justify-between bg-slate-900 text-slate-100">
          
          {/* HEADER */}
          <header className="bg-slate-850 border-b border-slate-800 sticky top-0 z-30 shadow-lg">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              
              <div className="flex items-center space-x-3 cursor-pointer">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-emerald-500 flex items-center justify-center text-white font-bold shadow-lg">
                  <Icon name="scale" className="w-6 h-6" />
                </div>
                <div>
                  <span className="font-display text-xl font-bold text-white tracking-tight">
                    PATENT<span className="text-brand-500">PAZARI</span> <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30">ENTERPRISE</span>
                  </span>
                  <span className="block text-[10px] text-slate-400 font-medium uppercase tracking-wider">
                    Canlı İhale • AI Vektör • AWS S3 Data Room
                  </span>
                </div>
              </div>

              {/* NAV TABS */}
              <nav className="flex items-center space-x-1 text-xs">
                <button
                  onClick={() => setActiveTab('auctions')}
                  className={`px-3 py-2 rounded-lg font-medium transition-colors flex items-center gap-1.5 ${
                    activeTab === 'auctions' ? 'bg-brand-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'
                  }`}
                >
                  <Icon name="zap" className="w-4 h-4 text-amber-400 animate-pulse" />
                  <span>Canlı Tersine İhaleler</span>
                </button>

                <button
                  onClick={() => setActiveTab('ai_match')}
                  className={`px-3 py-2 rounded-lg font-medium transition-colors flex items-center gap-1.5 ${
                    activeTab === 'ai_match' ? 'bg-brand-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'
                  }`}
                >
                  <Icon name="sparkles" className="w-4 h-4 text-emerald-400" />
                  <span>Yapay Zeka Eşleştirme</span>
                </button>

                <button
                  onClick={() => setActiveTab('patents')}
                  className={`px-3 py-2 rounded-lg font-medium transition-colors flex items-center gap-1.5 ${
                    activeTab === 'patents' ? 'bg-brand-600 text-white shadow' : 'text-slate-400 hover:bg-slate-800'
                  }`}
                >
                  <span>Patent Portföyü</span>
                </button>
              </nav>

              {/* SCRAPER BUTTON */}
              <button
                onClick={handleTriggerScraper}
                className="bg-slate-800 hover:bg-slate-700 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-700 text-amber-400 flex items-center gap-1.5"
              >
                <Icon name="bot" className="w-4 h-4 text-amber-400" />
                <span>EKAP Botu Çalıştır</span>
              </button>

            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
            
            {/* MODULE 1: CANLI TERSİNE İHALELER & REAL-TIME WEBSOCKET BIDDING */}
            {activeTab === 'auctions' && (
              <div className="space-y-6">
                
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-800 pb-4">
                  <div>
                    <h1 className="font-display text-2xl font-bold text-white flex items-center gap-2">
                      <Icon name="zap" className="w-6 h-6 text-amber-400" />
                      <span>İnşaat Sektörü Canlı Tersine İhaleleri (Real-Time Bidding)</span>
                    </h1>
                    <p className="text-slate-400 text-xs mt-1">
                      WebSocket üzerinden anlık teklif akışı ve race-condition korumalı canlı açık artırmalar
                    </p>
                  </div>
                </div>

                {bidNotice && (
                  <div className="bg-emerald-500/20 border border-emerald-500 text-emerald-300 p-4 rounded-xl text-xs font-bold animate-pulse">
                    {bidNotice}
                  </div>
                )}

                <div className="grid lg:grid-cols-2 gap-6">
                  {auctions.map(auction => (
                    <div key={auction.id} className="bg-slate-850 rounded-2xl border border-slate-800 p-6 space-y-4 shadow-xl flex flex-col justify-between">
                      <div className="space-y-3">
                        
                        <div className="flex items-center justify-between gap-2">
                          <span className="bg-brand-500/20 text-brand-400 border border-brand-500/30 text-[10px] font-bold px-2 py-0.5 rounded font-mono">
                            IPC {auction.ipc_code} (İnşaat)
                          </span>

                          {auction.source_type === 'ekap_scraper' ? (
                            <span className="bg-amber-500/20 text-amber-300 border border-amber-500/30 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1">
                              <Icon name="bot" className="w-3 h-3" />
                              EKAP Kamu Talebi
                            </span>
                          ) : (
                            <span className="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-[10px] font-bold px-2 py-0.5 rounded">
                              Özel Sektör İhalesi
                            </span>
                          )}
                        </div>

                        <h3 className="font-display font-bold text-lg text-white">{auction.title}</h3>
                        <p className="text-xs text-slate-400 leading-relaxed">{auction.problem_statement}</p>

                        <div className="bg-slate-900/80 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 text-xs">
                          <div>
                            <span className="text-slate-500 block">Tavan Bütçe:</span>
                            <span className="font-bold text-slate-300">{auction.max_budget_try.toLocaleString()} TL</span>
                          </div>
                          <div>
                            <span className="text-slate-500 block">Canlı En Düşük Teklif:</span>
                            <span className="font-bold text-emerald-400 text-sm">
                              {auction.current_lowest_bid_try.toLocaleString()} TL
                            </span>
                          </div>
                        </div>

                        <div className="flex items-center justify-between text-xs text-slate-400 pt-1">
                          <span>Toplam Teklif Sayısı: <strong className="text-white">{auction.bids_count}</strong></span>
                          <span className="text-amber-400 font-mono font-semibold flex items-center gap-1">
                            ⏱️ Kalan Süre: {auction.time_left}
                          </span>
                        </div>
                      </div>

                      <button
                        onClick={() => setSelectedAuctionBid(auction)}
                        className="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl text-xs shadow flex items-center justify-center gap-1.5 transition-colors"
                      >
                        <Icon name="zap" className="w-4 h-4 text-amber-400" />
                        <span>Canlı Teklif Ver (WebSocket Stream)</span>
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* MODULE 2: AI VECTOR MATCHING */}
            {activeTab === 'ai_match' && (
              <div className="max-w-4xl mx-auto space-y-6">
                
                <div className="border-b border-slate-800 pb-4">
                  <h1 className="font-display text-2xl font-bold text-white flex items-center gap-2">
                    <Icon name="sparkles" className="w-6 h-6 text-emerald-400" />
                    <span>Yapay Zeka Anlamsal (AI Vector) Patent Eşleştirici</span>
                  </h1>
                  <p className="text-slate-400 text-xs mt-1">
                    Alıcının teknik problemi ile patent özetlerini vektörel cosinüs benzerliğiyle kıyaslar.
                  </p>
                </div>

                <div className="bg-slate-850 p-6 rounded-2xl border border-slate-800 space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-slate-300 mb-1">
                      Aranan İnşaat / Mühendislik Problemi Tanımı
                    </label>
                    <textarea
                      rows="3"
                      value={aiQueryText}
                      onChange={(e) => setAiQueryText(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white focus:ring-2 focus:ring-brand-500"
                    ></textarea>
                  </div>

                  <button
                    onClick={handleRunAiMatch}
                    disabled={aiLoading}
                    className="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-2.5 rounded-xl text-xs shadow flex items-center gap-2"
                  >
                    <Icon name="sparkles" className="w-4 h-4" />
                    <span>{aiLoading ? 'AI Vektörler Analiz Ediliyor...' : 'Yapay Zeka İle En Uygun Patentleri Bul'}</span>
                  </button>
                </div>

                {aiMatches.length > 0 && (
                  <div className="space-y-4">
                    <h3 className="font-display font-bold text-lg text-white">Yapay Zeka Tarafından Önerilen Patentler</h3>
                    {aiMatches.map((m, idx) => (
                      <div key={idx} className="bg-slate-850 p-5 rounded-2xl border border-emerald-500/40 space-y-3 shadow-lg">
                        <div className="flex items-center justify-between">
                          <span className="font-mono text-xs text-slate-400">{m.patent_number}</span>
                          <span className="bg-emerald-500/20 text-emerald-300 text-xs font-bold px-2.5 py-1 rounded border border-emerald-500/40">
                            %{m.match_score} Anlamsal Uyum
                          </span>
                        </div>

                        <h4 className="font-bold text-white text-base">{m.title}</h4>
                        
                        <div className="bg-emerald-950/40 border border-emerald-800/50 p-3 rounded-xl text-xs text-emerald-200 leading-relaxed">
                          <strong>AI Gerekçesi:</strong> {m.ai_rationale}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* MODULE 4: PATENTS & SECURE DATA ROOM */}
            {activeTab === 'patents' && (
              <div className="space-y-6">
                <div className="border-b border-slate-800 pb-4">
                  <h1 className="font-display text-2xl font-bold text-white">Patent Portföyü & Güvenli Veri Odası</h1>
                  <p className="text-slate-400 text-xs mt-1">SMK 6769 Tescilli Patentler ve S3 Presigned Belge Havuzu</p>
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  {patents.map(pat => (
                    <div key={pat.id} className="bg-slate-850 p-6 rounded-2xl border border-slate-800 space-y-4 flex flex-col justify-between">
                      <div className="space-y-2">
                        <div className="flex items-center justify-between text-xs">
                          <span className="font-mono text-slate-400">{pat.patent_no}</span>
                          <span className="bg-brand-500/20 text-brand-400 font-bold px-2 py-0.5 rounded text-[10px]">IPC {pat.ipc_code}</span>
                        </div>
                        <h3 className="font-bold text-white text-base">{pat.title}</h3>
                        <p className="text-xs text-slate-400 line-clamp-3">{pat.abstract}</p>
                      </div>

                      <button
                        onClick={() => {
                          setSelectedDataRoomPatent(pat);
                          setNdaAccepted(false);
                          setPresignedUrl(null);
                        }}
                        className="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-semibold py-2.5 rounded-xl text-xs flex items-center justify-center gap-2"
                      >
                        <Icon name="lock" className="w-4 h-4 text-emerald-400" />
                        <span>Güvenli Veri Odası (Dijital NDA & S3 Belge)</span>
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>

          {/* MODAL: WEBSOCKET LIVE BIDDING */}
          {selectedAuctionBid && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 rounded-2xl border border-slate-800 max-w-md w-full p-6 space-y-5 shadow-2xl relative">
                
                <div className="flex justify-between items-start">
                  <div>
                    <h3 className="font-display font-bold text-lg text-white">Canlı İhale Teklif Formu</h3>
                    <p className="text-xs text-slate-400">{selectedAuctionBid.title}</p>
                  </div>
                  <button onClick={() => setSelectedAuctionBid(null)} className="text-slate-400 hover:text-white">✕</button>
                </div>

                <div className="bg-slate-850 p-4 rounded-xl border border-slate-800 space-y-2 text-xs">
                  <div className="flex justify-between text-slate-400">
                    <span>Mevcut En Düşük Teklif:</span>
                    <strong className="text-emerald-400 text-sm">{selectedAuctionBid.current_lowest_bid_try.toLocaleString()} TL</strong>
                  </div>
                </div>

                <form onSubmit={handleSendLiveBid} className="space-y-4 text-xs">
                  <div>
                    <label className="block text-slate-300 font-semibold mb-1">
                      Yeni Teklif Tutarı (TL) *
                    </label>
                    <input
                      type="number"
                      required
                      value={bidAmountInput}
                      onChange={(e) => setBidAmountInput(e.target.value)}
                      placeholder={`Örn: ${(selectedAuctionBid.current_lowest_bid_try - 50000).toString()}`}
                      className="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-white text-xs focus:ring-2 focus:ring-brand-500"
                    />
                  </div>

                  <div className="flex justify-end gap-2 pt-2">
                    <button type="button" onClick={() => setSelectedAuctionBid(null)} className="px-4 py-2 bg-slate-800 text-slate-300 rounded-lg">İptal</button>
                    <button type="submit" className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg shadow">Teklifi Gönder & Yayınla</button>
                  </div>
                </form>

              </div>
            </div>
          )}

          {/* MODAL: SECURE DATA ROOM & DIGITAL NDA */}
          {selectedDataRoomPatent && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 rounded-2xl border border-slate-800 max-w-xl w-full p-6 space-y-5 shadow-2xl relative">
                
                <div className="flex justify-between items-start">
                  <div>
                    <h3 className="font-display font-bold text-lg text-white flex items-center gap-2">
                      <Icon name="lock" className="w-5 h-5 text-emerald-400" />
                      <span>Güvenli Veri Odası & Dijital NDA</span>
                    </h3>
                    <p className="text-xs text-slate-400">{selectedDataRoomPatent.title}</p>
                  </div>
                  <button onClick={() => setSelectedDataRoomPatent(null)} className="text-slate-400 hover:text-white">✕</button>
                </div>

                {!presignedUrl ? (
                  <div className="space-y-4 text-xs">
                    <div className="bg-slate-850 p-4 rounded-xl border border-slate-800 space-y-2 text-slate-300 leading-relaxed max-h-48 overflow-y-auto">
                      <h4 className="font-bold text-white">DİJİTAL GİZLİLİK VE BİLGİ GİZLEME SÖZLEŞMESİ (NDA)</h4>
                      <p>
                        İşbu belgeyi onaylayarak, erişeceğiniz patent gizli şartnamesi, teknik çizimler ve ön test raporlarını 6769 sayılı SMK uyarınca üçüncü şahıslarla paylaşmayacağınızı beyan ve taahhüt edersiniz.
                      </p>
                    </div>

                    <label className="flex items-center space-x-2 text-slate-300 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={ndaAccepted}
                        onChange={(e) => setNdaAccepted(e.target.checked)}
                        className="rounded border-slate-700 bg-slate-950 text-brand-500"
                      />
                      <span>SMK 6769 Dijital Gizlilik Sözleşmesini (NDA) okudum ve onaylıyorum.</span>
                    </label>

                    <button
                      onClick={handleAcceptNdaAndGetPresignedUrl}
                      className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl shadow flex items-center justify-center gap-2"
                    >
                      <Icon name="lock" className="w-4 h-4" />
                      <span>Sözleşmeyi Onayla ve AWS S3 Güvenli Linki Al</span>
                    </button>
                  </div>
                ) : (
                  <div className="bg-emerald-950/40 border border-emerald-500/40 p-5 rounded-2xl space-y-3 text-xs">
                    <div className="flex items-center space-x-2 text-emerald-400 font-bold">
                      <Icon name="shieldCheck" className="w-5 h-5" />
                      <span>NDA ONALANDI — AWS S3 Süreli Link Oluşturuldu (15 Dakika)</span>
                    </div>

                    <a
                      href={presignedUrl}
                      target="_blank"
                      className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2.5 rounded-xl block text-center shadow flex items-center justify-center gap-2"
                    >
                      <Icon name="download" className="w-4 h-4" />
                      <span>Gizli Teknik Şartname PDF İndir (AWS S3 Presigned)</span>
                    </a>
                  </div>
                )}

              </div>
            </div>
          )}

          {/* FOOTER */}
          <footer className="bg-slate-850 text-slate-500 text-xs py-6 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
              <span>&copy; {new Date().getFullYear()} Patent Pazarı Enterprise. Tüm Hakları Saklıdır.</span>
              <span>WebSocket • AI Matching • AWS S3 Data Room</span>
            </div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
