                                <div className="flex items-center justify-between text-[11px] mb-1">
                                  <span className="font-semibold text-slate-900">{interest.alici_sirket}</span>
                                  {interest.durum === 'olgunlasti' ? (
                                    <span className="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded">

                                    <span className="bg-sky-100 text-sky-800 text-[10px] font-medium px-2 py-0.5 rounded capitalize">
                                      {interest.durum}
                                    </span>

                                </div>

                                <div className="text-xs font-medium text-slate-700 line-clamp-1">
                                  {listing ? listing.baslik : 'İlan'}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>

                  </div>

                  {/* RIGHT: CHAT & LEGAL ALERT */}
                  <div className="lg:col-span-7">
                    {activeChatInterestId ? (
                      (() => {
                        const interest = interests.find(i => i.id === activeChatInterestId);
                        const listing = listings.find(l => l.id === interest?.ilan_id);
                        const threadMsgs = messages.filter(m => m.ilgi_id === activeChatInterestId);

                        return (
                          <div className="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[600px]">
                            
                            <div className="p-4 border-b border-slate-200 flex items-center justify-between bg-slate-50 rounded-t-xl">
                              <div>
                                <h4 className="font-display font-bold text-slate-900 text-sm">
                                  {listing?.baslik}
                                </h4>
                                <div className="text-xs text-slate-500">
                                  Alıcı: <span className="font-semibold">{interest?.alici_ad} ({interest?.alici_sirket})</span>
                                </div>
                              </div>

                              {currentUser.rol === 'satici' && (
                                <div className="flex items-center space-x-2">
                                  <span className="text-xs text-slate-500">Durum:</span>
                                  <select
                                    value={interest?.durum}
                                    onChange={(e) => handleUpdateInterestStatus(interest.id, e.target.value)}

                                  >
                                    <option value="yeni">Yeni</option>
                                    <option value="gorusuluyor">Görüşülüyor</option>
                                    <option value="olgunlasti">Olgunlaştı (Anlaşma Yakın)</option>
                                    <option value="kapandi">Kapandı</option>
                                  </select>
                                </div>

                                  <Icon name="scale" className="w-5 h-5 text-emerald-700" />
                                  <span>HUKUKİ YÖNLENDİRME (SMK 6769 UYARISI)</span>
                                </div>
                                <p className="text-xs text-emerald-800 leading-relaxed font-medium">
                                  Devir sözleşmeleri noter huzurunda yapılmak zorundadır (SMK 6769). Noter onayı olmayan devir TÜRKPATENT nezdinde hüküm doğurmaz. Bir patent vekili veya noterle iletişime geçin.
                                </p>
                              </div>
                            )}

                            <div className="flex-1 p-4 overflow-y-auto space-y-3 bg-slate-50/50">
                              {threadMsgs.map(msg => {
                                const isMe = msg.gonderen_id === currentUser.id;
                                return (
                                  <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                                    <div className="text-[10px] text-slate-400 mb-0.5 px-1">{msg.gonderen_ad} • {msg.tarih}</div>
                                    <div className={`max-w-md rounded-2xl px-4 py-2.5 text-xs shadow-sm ${

                                      {msg.icerik}

                                  </div>
                                );
                              })}

                            <div className="p-3 border-t border-slate-200 bg-white rounded-b-xl">
                              <form
                                onSubmit={(e) => {
                                  e.preventDefault();
                                  handleSendChatMessage(activeChatInterestId, e.target.chatInput.value);
                                  e.target.reset();

                                <input
                                  type="text"
                                  name="chatInput"

                                </button>
                              </form>
                            </div>

                          </div>

                  <p className="text-slate-600 text-sm">
                    Hak türü katmanları ve IPC Uluslararası Patent Sınıflandırması hakkında teknik bilgilendirme.
                  </p>
                </div>

                <div className="bg-white rounded-2xl border border-slate-200 p-8 space-y-6 text-xs text-slate-700 leading-relaxed shadow-sm">
                  
                  <div className="space-y-3">
                    <h3 className="font-display font-bold text-slate-900 text-base flex items-center gap-2">
                      <Icon name="scale" className="w-5 h-5 text-brand-600" />
                      <span>1. Katman 1 — Sınai Mülkiyet Hakkı Türleri</span>

                      Platformumuzda öncelikli olarak <strong>Patent</strong> (20 yıl koruma süreli buluşlar) ve <strong>Faydalı Model</strong> (10 yıl koruma süreli buluşlar) türleri listelenmektedir. Ayrıca Endüstriyel Tasarım (Locarno), Marka (Nice 1-45), Coğrafi İşaretler ve Entegre Devre Topografyaları için kurgusal alanlar mevcuttur.
                    </p>
                  </div>

                  <div className="space-y-3 pt-4 border-t border-slate-100">
                    <h3 className="font-display font-bold text-slate-900 text-base flex items-center gap-2">
                      <Icon name="fileText" className="w-5 h-5 text-brand-600" />
                      <span>2. Katman 2 — IPC Uluslararası Patent Sınıflandırması</span>
                    </h3>
                    <p>
                      Alıcı ve sanayi kuruluşlarının sektör aramalarını kolaylaştırmak amacıyla ilanlar WIPO IPC 8 Ana Bölüm (A'dan H'ye) altında sınıflandırılmaktadır:
                    </p>
                    <ul className="list-disc pl-5 space-y-1 text-slate-600">
                      <li><strong>A:</strong> İnsan İhtiyaçları (Tarım, Gıda, Sağlık)</li>
                      <li><strong>B:</strong> İşlemler, Taşımacılık (İmalat, Ambalaj)</li>
                      <li><strong>C:</strong> Kimya, Metalurji (Biyoteknoloji, Alaşımlar)</li>
                      <li><strong>D:</strong> Tekstil, Kağıt</li>
                      <li><strong>E:</strong> Sabit Yapılar (İnşaat, Madencilik)</li>
                      <li><strong>F:</strong> Makine Mühendisliği (Motorlar, Isıtma)</li>
                      <li><strong>G:</strong> Fizik (Bilgi İşlem / G06 Yazılım, Sensörler)</li>
                      <li><strong>H:</strong> Elektrik (Elektronik, İletişim)</li>
                    </ul>
                  </div>

                  <div className="space-y-3 pt-4 border-t border-slate-100">
                    <h3 className="font-display font-bold text-slate-900 text-base flex items-center gap-2">
                      <Icon name="ban" className="w-5 h-5 text-amber-600" />
                      <span>3. Kapsam Dışı İlan Moderasyon Kuralı</span>
                    </h3>
                    <p className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-amber-900">
                      Platform politika ve etiği gereğince Silah, Mühimmat, Patlayıcı Maddeler (IPC F41, F42) ve Nükleer Silah/Hassas Malzemeler (IPC G21) içeren başvurular otomatik kısıtlamaya tabidir ve ilan kabul edilmemektedir.
                    </p>
                  </div>

                </div>

              </div>
            )}

          </main>

          {/* --- MODAL 1: İLAN DETAY MODALI --- */}
          {selectedListingDetail && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 sm:p-8 space-y-6 shadow-2xl relative">
                
                <button
                  onClick={() => setSelectedListingDetail(null)}
                  className="absolute right-4 top-4 text-slate-400 hover:text-slate-600 p-1"
                >
                  <Icon name="xCircle" className="w-6 h-6" />
                </button>

                <div className="space-y-2">
                  <div className="flex flex-wrap items-center gap-2 text-xs">
                    <span className="font-mono text-slate-500 font-bold">{selectedListingDetail.patent_no}</span>
                    <span className="bg-brand-100 text-brand-800 font-bold px-2 py-0.5 rounded text-[10px]">
                      IPC {selectedListingDetail.ipc_alt || selectedListingDetail.ipc_ana}
                    </span>
                    {selectedListingDetail.sicil_durumu === 'dogrulandi' ? (
                      <span className="bg-emerald-100 text-emerald-800 font-bold px-2 py-0.5 rounded text-[10px]">
                        TÜRKPATENT Doğrulandı
                      </span>
                    ) : (
                      <span className="bg-amber-100 text-amber-800 font-medium px-2 py-0.5 rounded text-[10px]">
                        İncelemede
                      </span>
                    )}
                  </div>

                  <h2 className="font-display font-bold text-xl text-slate-900">
                    {selectedListingDetail.baslik}
                  </h2>
                </div>

                <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl text-xs border border-slate-100">
                  <div>
                    <span className="text-slate-400 block">Katman 1 (Hak Türü):</span>
                    <span className="font-semibold text-slate-800 capitalize">
                      {HAK_TURULERI.find(h => h.id === selectedListingDetail.hak_turu)?.ad || selectedListingDetail.hak_turu}

                  </div>
                  <div>
                    <span className="text-slate-400 block">Katman 2 (IPC Sektörü):</span>
                    <span className="font-semibold text-slate-800 font-mono">
                      {IPC_SEKTORLERI.find(i => i.kod === selectedListingDetail.ipc_ana)?.ad}
                    </span>
                  </div>
                  <div>
                    <span className="text-slate-400 block">Sahiplik:</span>
                    <span className="font-semibold text-slate-800">{selectedListingDetail.satici_sirket}</span>
                  </div>
                  <div>
                    <span className="text-slate-400 block">Asgari Beklenti:</span>
                    <span className="font-semibold text-brand-700">{selectedListingDetail.asgari_beklenti}</span>
                  </div>
                </div>

                <div className="space-y-2 text-xs text-slate-700 leading-relaxed">
                  <h4 className="font-bold text-slate-900 text-sm">Buluş Detayı ve Özellikleri:</h4>
                  <p>{selectedListingDetail.aciklama}</p>
                </div>

                {selectedListingDetail.sicil_link && (
                  <div className="pt-2">
                    <a
                      href={selectedListingDetail.sicil_link}
                      target="_blank"
                      className="inline-flex items-center space-x-2 text-xs font-semibold text-brand-600 bg-brand-50 border border-brand-200 px-3 py-2 rounded-lg hover:bg-brand-100 transition-colors"
                    >
                      <span>TÜRKPATENT Resmi Sicil Kaydını Gör</span>
                      <Icon name="externalLink" className="w-3.5 h-3.5" />
                    </a>
                  </div>
                )}

                <div className="pt-4 border-t border-slate-200 flex items-center justify-between">
                  <button
                    onClick={() => setSelectedListingDetail(null)}
                    className="px-4 py-2 border border-slate-300 text-slate-700 text-xs font-medium rounded-lg hover:bg-slate-50"
                  >
                    Kapat
                  </button>

                  <button
                    onClick={() => setShowInterestModal(true)}
                    className="px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold rounded-lg shadow flex items-center gap-1.5"
                  >
                    <Icon name="messageSquare" className="w-4 h-4" />
                    <span>Satıcıyla İletişime Geç (İlgileniyorum)</span>
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- MODAL 2: İLGİ BİLDİRİMİ GÖNDERME MODALI --- */}
          {showInterestModal && selectedListingDetail && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl max-w-lg w-full p-6 space-y-5 shadow-2xl relative">
                
                <div className="space-y-1">
                  <h3 className="font-display font-bold text-lg text-slate-900">
                    İlgi Bildirimi & Mesaj Gönder
                  </h3>
                  <p className="text-xs text-slate-500">
                    {selectedListingDetail.baslik}
                  </p>
                </div>

                <div className="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-200">
                  İlgi bildiriminiz satıcı firmaya (<span className="font-semibold">{selectedListingDetail.satici_sirket}</span>) iletilecek ve panelleriniz arasında doğrudan mesajlaşma kanalı açılacaktır.
                </div>

                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">
                    İlk Mesajınız veya Sorunuz

                  <textarea
                    rows="4"
                    value={interestMessageText}
                    onChange={(e) => setInterestMessageText(e.target.value)}

                </div>

                <div className="flex justify-end space-x-3 text-xs">
                  <button
                    onClick={() => setShowInterestModal(false)}
                    className="px-4 py-2 border border-slate-300 text-slate-700 font-medium rounded-lg"

                    İptal
                  </button>
                  <button
                    onClick={handleSendInterest}
                    className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg shadow"
                  >
                    İlgi Bildirimini Gönder
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* GLOBAL FOOTER */}
          <footer className="bg-slate-900 text-slate-400 text-xs py-10 border-t border-slate-800 mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6">
              
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-slate-800 pb-6">
                <div className="flex items-center space-x-2">
                  <div className="w-7 h-7 rounded-lg bg-brand-600 flex items-center justify-center text-white font-bold">
                    <Icon name="scale" className="w-4 h-4" />
                  </div>
                  <span className="font-display font-bold text-white text-base">PATENTPAZARI</span>
                </div>
                
                <div className="flex space-x-6 text-slate-400">
                  <button onClick={() => setActiveTab('home')} className="hover:text-white">Ana Sayfa</button>
                  <button onClick={() => setActiveTab('listings')} className="hover:text-white">İlanlar</button>
                  <button onClick={() => setActiveTab('guide')} className="hover:text-white">SMK 6769 Rehberi</button>
                </div>
              </div>

              <div className="text-[11px] text-slate-500 leading-relaxed max-w-4xl">
                <p>
                  <strong>Genel Sorumluluk Reddi (Disclaimer):</strong> Patent Pazarı, 6769 sayılı Sınai Mülkiyet Kanunu ve WIPO IPC Uluslararası Patent Sınıflandırması kapsamında hak sahipleri ile alıcı ve yatırımcılar arasında keşfedilebilirlik sağlayan bağımsız bir portal alanıdır. Platformumuz hukuki danışmanlık veya noterlik sunmaz. Devir ve lisans işlemleri noter nezdinde yapılmak zorundadır.
                </p>
              </div>

              <div className="flex justify-between items-center text-[10px] text-slate-600 pt-4 border-t border-slate-800/60">
                <span>&copy; {new Date().getFullYear()} Patent Pazarı. Tüm hakları saklıdır.</span>
                <span>IPC & SMK 6769 Sınai Mülkiyet Eşleştirme Platformu</span>
              </div>

            </div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
